<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Requisite Vinyl Album Collection</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  color:#eee;
}

body.dark-default{ background-image:url("backgrounds/dark-default.png"); }
body.dark-muted{ background-image:url("backgrounds/dark-muted.png"); }
body.dark-ultra{ background-image:url("backgrounds/dark-ultra.png"); }

body{
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.45);
  z-index:-1;
}

.app-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  z-index:100;
  box-sizing:border-box;
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  background:rgba(18,18,18,.42);
  border-radius:12px;
  box-shadow:
    0 10px 24px rgba(0,0,0,.35),
    0 2px 4px rgba(0,0,0,.25);
  backdrop-filter:blur(4px);
}

.header-left label{
  font-size:14px;
  font-weight:700;
  color:#f0f0f0;
}

.header-left select{
  min-width:260px;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(28,28,28,.88);
  color:#f0f0f0;
  font-size:14px;
  outline:none;
}

.app-header img{
  height:62px;
  object-fit:contain;
  margin-right:0;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.7));
}

.container{
  padding:118px 50px 60px;
  max-width:1120px;
  margin:0 auto;
  box-sizing:border-box;
}

.artist-panels{
  display:grid;
  grid-template-columns:1.1fr 1fr 1fr;
  gap:20px;
  margin-bottom:34px;
}

.panel{
  background:rgba(20,20,20,.52);
  border-radius:14px;
  padding:18px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.42),
    0 3px 6px rgba(0,0,0,.28);
  backdrop-filter:blur(4px);
  min-height:150px;
}

.panel-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
}

.meta-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 14px;
}

.meta-item{
  font-size:13px;
}

.meta-label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  color:#bbb;
  margin-bottom:3px;
}

.panel-text{
  font-size:14px;
  line-height:1.5;
}

.section-title{
  font-size:28px;
  font-weight:800;
  margin:0 0 18px;
}

.albums{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}

.card{
  position:relative;
  width:200px;
  background:rgba(20,20,20,.58);
  border-radius:12px;
  padding:12px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.7),
    0 3px 6px rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

.album-title{
  margin-top:10px;
  font-size:15px;
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#ccc;
  margin-top:4px;
}

.collection-line{
  margin-top:8px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
}

.collection-mark.owned{ color:#8fdc8f; }
.collection-mark.wanted{ color:#f1e7c8; }

.hover-detail{
  position:absolute;
  left:12px;
  right:12px;
  top:12px;
  bottom:12px;
  padding:14px;
  border-radius:8px;
  background:rgba(0,0,0,.85);
  opacity:0;
  transition:opacity .2s;
}

.card:hover .hover-detail{
  opacity:1;
}

.reference-block{
  margin-top:38px;
}

.reference-item{
  font-size:18px;
}
</style>
</head>

<body class="dark-default">

<div class="app-header">
  <div class="header-left">
    <label>Artist</label>
    <select id="artistSelect"></select>
  </div>
  <img src="backgrounds/banner.png">
</div>

<div class="container">
  <div id="library"></div>
</div>

<script>
fetch('library.json')
.then(r=>r.json())
.then(data=>{

  const artists={};

  data.forEach(a=>{
    const name=a.artist_name;
    if(!artists[name]){
      artists[name]={curated:[],reference:[],info:a};
    }

    const isCurated = a.album_id !== null;

    if(isCurated){
      artists[name].curated.push(a);
    }else{
      artists[name].reference.push(a);
    }
  });

  const select=document.getElementById("artistSelect");
  const container=document.getElementById("library");

  Object.keys(artists).sort().forEach(n=>{
    const o=document.createElement("option");
    o.value=n; o.textContent=n;
    select.appendChild(o);
  });

  function render(name){
    const a=artists[name];
    container.innerHTML="";

    const panels=document.createElement("div");
    panels.className="artist-panels";

    const meta=document.createElement("div");
    meta.className="panel";

    const metaFields=[
      ["Name",a.info.artist_name],
      ["Sort",a.info.sort_name],
      ["Type",a.info.artist_type],
      ["Area",a.info.area],
      ["Born",a.info.born],
      ["Died",a.info.ended],
      ["Born In",a.info.born_in]
    ];

    const grid=document.createElement("div");
    grid.className="meta-grid";

    metaFields.forEach(p=>{
      const d=document.createElement("div");
      d.className="meta-item";
      d.innerHTML="<span class='meta-label'>"+p[0]+"</span>"+(p[1]||"—");
      grid.appendChild(d);
    });

    meta.innerHTML="<div class='panel-title'>Metadata</div>";
    meta.appendChild(grid);

    const desc=document.createElement("div");
    desc.className="panel";
    desc.innerHTML="<div class='panel-title'>Description</div><div class='panel-text'>Placeholder</div>";

    const news=document.createElement("div");
    news.className="panel";
    news.innerHTML="<div class='panel-title'>News</div><div class='panel-text'>Placeholder</div>";

    panels.append(meta,desc,news);
    container.appendChild(panels);

    const title=document.createElement("div");
    title.className="section-title";
    title.textContent="Best Albums";
    container.appendChild(title);

    const albums=document.createElement("div");
    albums.className="albums";

    a.curated.forEach(x=>{
      const c=document.createElement("div");
      c.className="card";

      const img=document.createElement("img");
      img.src="media/covers/"+x.cover_path.split('/').pop();

      const h=document.createElement("div");
      h.className="hover-detail";
      h.innerHTML=x.album_title;

      c.append(img,h);
      albums.appendChild(c);
    });

    container.appendChild(albums);

    if(a.reference.length){
      const ref=document.createElement("div");
      ref.className="reference-block";
      ref.innerHTML="<div class='section-title'>Other Studio Albums</div>";

      a.reference.forEach(r=>{
        const i=document.createElement("div");
        i.className="reference-item";
        i.textContent=r.ref_title;
        ref.appendChild(i);
      });

      container.appendChild(ref);
    }
  }

  select.onchange=()=>render(select.value);
  render(Object.keys(artists)[0]);

});
</script>

</body>
</html>

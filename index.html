<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<title>Requisite Vinyl Album Collection</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  color:#eee;
}

body.dark-default{ background-image:url("backgrounds/dark-default.png"); }
body.dark-muted{ background-image:url("backgrounds/dark-muted.png"); }
body.dark-ultra{ background-image:url("backgrounds/dark-ultra.png"); }

body{
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:-1;
}

.app-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  z-index:100;
  box-sizing:border-box;
}

.header-left{
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 14px;
  background:rgba(18,18,18,.42);
  border-radius:12px;
  box-shadow:
    0 10px 24px rgba(0,0,0,.35),
    0 2px 4px rgba(0,0,0,.25);
  backdrop-filter:blur(4px);
}

.header-left label{
  font-size:20px;
  font-weight:800;
  color:#f0f0f0;
  letter-spacing:.02em;
}

.header-left select{
  min-width:280px;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(28,28,28,.88);
  color:#f0f0f0;
  font-size:15px;
  outline:none;
}

.app-header img{
  height:62px;
  object-fit:contain;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.7));
}

.container{
  padding:118px 28px 60px;
  max-width:1420px;
  margin:0 auto;
  box-sizing:border-box;
}

.artist-panels{
  display:grid;
  grid-template-columns:260px minmax(260px, 1fr) minmax(260px, 1fr);
  gap:20px;
  margin-bottom:18px;
  align-items:stretch;
}

.panel{
  background:rgba(20,20,20,.52);
  border-radius:14px;
  padding:18px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.42),
    0 3px 6px rgba(0,0,0,.28);
  backdrop-filter:blur(4px);
}

.artist-image-panel{
  padding:12px;
}

.artist-image,
.artist-image-placeholder{
  width:100%;
  aspect-ratio:1 / 1;
  border-radius:10px;
}

.artist-image{
  display:block;
  object-fit:cover;
  background:rgba(255,255,255,.04);
}

.artist-image-placeholder{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:rgba(255,255,255,.05);
  color:#cfcfcf;
  font-size:14px;
}

.panel-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
}

.meta-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 16px;
}

.meta-item{
  font-size:13px;
}

.meta-label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  color:#bbb;
  margin-bottom:3px;
}

.meta-value{
  display:block;
  font-size:13px;
}

.meta-value a{
  color:#cfe3ff;
  text-decoration:none;
  border-bottom:1px solid rgba(207,227,255,.35);
}

.meta-value a:hover{
  border-bottom-color:rgba(207,227,255,.8);
}

.panel-text{
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
  max-height:165px;
  overflow-y:auto;
  padding-right:6px;
}

.news-panel{
  margin-bottom:34px;
}

.section-title{
  font-size:28px;
  font-weight:800;
  margin:0 0 18px;
}

.albums{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}

.card{
  position:relative;
  width:200px;
  background:rgba(20,20,20,.58);
  border-radius:12px;
  padding:12px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.7),
    0 3px 6px rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
  display:block;
  background:rgba(255,255,255,.05);
}

.year-line{
  margin-top:10px;
  font-size:12px;
  color:#cfcfcf;
  letter-spacing:.04em;
}

.album-title{
  margin-top:4px;
  font-size:15px;
  font-weight:600;
  line-height:1.35;
}

.collection-line{
  margin-top:8px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.priority-mark{
  color:#ddd;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.collection-mark{
  font-weight:700;
  letter-spacing:.02em;
  color:#8fdc8f;
  flex-shrink:0;
  white-space:nowrap;
}

.hover-detail{
  position:absolute;
  left:12px;
  right:12px;
  top:12px;
  bottom:12px;
  padding:14px;
  border-radius:8px;
  background:rgba(0,0,0,.88);
  opacity:0;
  transition:opacity .2s;
  overflow:auto;
}

.card:hover .hover-detail{
  opacity:1;
}

.reference-block{
  margin-top:38px;
}

.reference-list{
  display:grid;
  gap:10px;
}

.reference-item{
  font-size:18px;
  padding:12px 14px;
  background:rgba(20,20,20,.42);
  border-radius:10px;
  box-shadow:
    0 8px 18px rgba(0,0,0,.28),
    0 2px 4px rgba(0,0,0,.2);
}

.reference-empty{
  font-size:15px;
  color:#c8c8c8;
  opacity:.85;
  font-style:italic;
}

@media (max-width: 1280px){
  .artist-panels{
    grid-template-columns:240px 1fr 1fr;
  }
}
@media (max-width: 760px){
  .artist-panels{
    grid-template-columns:1fr;
  }

  .app-header{
    height:auto;
    padding:14px 18px;
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }

  .container{
    padding:138px 22px 40px;
  }

  .header-left{
    width:100%;
  }

  .header-left select{
    min-width:0;
    width:100%;
  }
}

  .header-left select{
    min-width:0;
    width:100%;
  }
}
</style>
</head>

<body class="dark-default">

<div class="app-header">
  <div class="header-left">
    <label for="artistSelect">Artist</label>
    <select id="artistSelect"></select>
  </div>
  <img src="backgrounds/banner.png" alt="Requisite Vinyl Album Collection">
</div>

<div class="container">
  <div id="library"></div>
</div>

<script>
fetch("./library.json?v=" + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(data){

    function present(value){
      return value !== null && value !== undefined && String(value).trim() !== "";
    }

    function safe(value){
      return present(value) ? String(value) : "—";
    }

    function coverSrc(path){
      if(!present(path)) return "";
      return "media/covers/" + String(path).split("/").pop();
    }

    function artistImageSrc(path){
      if(!present(path)) return "";
      return "media/artists/" + String(path).split("/").pop();
    }

    function isOwned(value){
      return (
        value === 1 ||
        value === "1" ||
        value === true ||
        String(value).toLowerCase() === "true"
      );
    }

    function cleanProfile(text){
      if(!present(text)) return "";
      return String(text).replace(/\r\n/g, "\n").trim();
    }

    var artists = {};

    data.forEach(function(row){
      var key = String(row.artist_id || row.artist_name || "unknown");

      if(!artists[key]){
        artists[key] = {
          artist_id: row.artist_id,
          artist_name: row.artist_name || "Unknown Artist",
          info: {},
          curated: [],
          reference: []
        };
      }

      var info = artists[key].info;

      if(present(row.artist_name) && !present(info.artist_name)) info.artist_name = row.artist_name;
      if(present(row.sort_name) && !present(info.sort_name)) info.sort_name = row.sort_name;
      if(present(row.genre) && !present(info.genre)) info.genre = row.genre;
      if(present(row.artist_type) && !present(info.artist_type)) info.artist_type = row.artist_type;
      if(present(row.area) && !present(info.area)) info.area = row.area;
      if(present(row.born) && !present(info.born)) info.born = row.born;
      if(present(row.ended) && !present(info.ended)) info.ended = row.ended;
      if(present(row.description) && !present(info.description)) info.description = row.description;
      if(present(row.image_path) && !present(info.image_path)) info.image_path = row.image_path;
      if(present(row.discogs_artist_id)) info.discogs_artist_id = row.discogs_artist_id;

      var hasCuratedAlbumId =
        row.album_id !== null &&
        row.album_id !== undefined &&
        String(row.album_id).trim() !== "";

      var hasReferenceTitle =
        row.ref_title !== null &&
        row.ref_title !== undefined &&
        String(row.ref_title).trim() !== "";

      if(hasCuratedAlbumId){
        artists[key].curated.push(row);
      } else if(hasReferenceTitle){
        artists[key].reference.push(row);
      }
    });

    var artistList = Object.keys(artists)
      .map(function(key){ return artists[key]; })
      .sort(function(a, b){
        return a.artist_name.localeCompare(b.artist_name);
      });

    var select = document.getElementById("artistSelect");
    var container = document.getElementById("library");

    select.innerHTML = "";

    artistList.forEach(function(artist){
      var option = document.createElement("option");
      option.value = String(artist.artist_id);
      option.textContent = artist.artist_name;
      select.appendChild(option);
    });

    function render(artistId){
      var artist = artistList.find(function(item){
        return String(item.artist_id) === String(artistId);
      });

      if(!artist) return;

      container.innerHTML = "";

      var panels = document.createElement("div");
      panels.className = "artist-panels";

      var imagePanel = document.createElement("div");
      imagePanel.className = "panel artist-image-panel";

      var imagePath = artistImageSrc(artist.info.image_path);

      if(present(imagePath)){
        var artistImg = document.createElement("img");
        artistImg.className = "artist-image";
        artistImg.src = imagePath;
        artistImg.alt = safe(artist.artist_name);
        artistImg.onerror = function(){
          imagePanel.innerHTML = "<div class='artist-image-placeholder'>No artist image</div>";
        };
        imagePanel.appendChild(artistImg);
      } else {
        imagePanel.innerHTML = "<div class='artist-image-placeholder'>No artist image</div>";
      }

      var meta = document.createElement("div");
      meta.className = "panel";
      meta.innerHTML = "<div class='panel-title'>Metadata</div>";

      var grid = document.createElement("div");
      grid.className = "meta-grid";

      [
        ["Sort", artist.info.sort_name],
        ["Genre", artist.info.genre],
        ["Type", artist.info.artist_type],
        ["Area", artist.info.area],
        ["Born", artist.info.born],
        ["Disbanded/Died", artist.info.ended],
        ["Source", artist.info.discogs_artist_id]
      ].forEach(function(pair){
        var item = document.createElement("div");
        item.className = "meta-item";

        var label = document.createElement("span");
        label.className = "meta-label";
        label.textContent = pair[0];

        var value = document.createElement("span");
        value.className = "meta-value";

        if(pair[0] === "Source" && present(pair[1])){
          var a = document.createElement("a");
          a.href = "https://www.discogs.com/artist/" + pair[1];
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = "Discogs";

          var span = document.createElement("span");
          span.textContent = " (data)";

          value.appendChild(a);
          value.appendChild(span);
        } else {
          value.textContent = safe(pair[1]);
        }

        item.appendChild(label);
        item.appendChild(value);
        grid.appendChild(item);
      });

      meta.appendChild(grid);

      var profile = document.createElement("div");
      profile.className = "panel";
      profile.innerHTML =
        "<div class='panel-title'>Profile</div>" +
        "<div class='panel-text'>" + safe(cleanProfile(artist.info.description)) + "</div>";

      var news = document.createElement("div");
      news.className = "panel news-panel";
      news.innerHTML =
        "<div class='panel-title'>News</div>" +
        "<div class='panel-text'>Placeholder</div>";

      panels.appendChild(imagePanel);
      panels.appendChild(meta);
      panels.appendChild(profile);

      container.appendChild(panels);
      container.appendChild(news);

      var curatedTitle = document.createElement("div");
      curatedTitle.className = "section-title";
      curatedTitle.textContent = "Recommended Albums";
      container.appendChild(curatedTitle);

      var albums = document.createElement("div");
      albums.className = "albums";

      artist.curated
        .sort(function(a, b){
          var ay = present(a.year) ? Number(a.year) : 9999;
          var by = present(b.year) ? Number(b.year) : 9999;
          if(ay !== by) return ay - by;
          return String(a.album_title || "").localeCompare(String(b.album_title || ""));
        })
        .forEach(function(album){
          var card = document.createElement("div");
          card.className = "card";

          var img = document.createElement("img");
          img.src = coverSrc(album.cover_path);
          img.alt = safe(album.album_title);

          var year = document.createElement("div");
          year.className = "year-line";
          year.textContent = safe(album.year);

          var albumTitle = document.createElement("div");
          albumTitle.className = "album-title";
          albumTitle.textContent = safe(album.album_title);

          var collectionLine = document.createElement("div");
          collectionLine.className = "collection-line";

          var priority = document.createElement("span");
          priority.className = "priority-mark";
          priority.textContent = safe(album.buy_priority);

          var owned = document.createElement("span");
          owned.className = "collection-mark";
          owned.textContent = isOwned(album.owned) ? "✓ Owned" : "";

          var hover = document.createElement("div");
          hover.className = "hover-detail";
          hover.textContent = safe(album.album_title);

          collectionLine.appendChild(priority);
          collectionLine.appendChild(owned);

          card.appendChild(img);
          card.appendChild(year);
          card.appendChild(albumTitle);
          card.appendChild(collectionLine);
          card.appendChild(hover);

          albums.appendChild(card);
        });

      container.appendChild(albums);

      var referenceBlock = document.createElement("div");
      referenceBlock.className = "reference-block";

      var referenceTitle = document.createElement("div");
      referenceTitle.className = "section-title";
      referenceTitle.textContent = "Other Studio Albums";
      referenceBlock.appendChild(referenceTitle);

      if(artist.reference.length){
        var referenceList = document.createElement("div");
        referenceList.className = "reference-list";

        artist.reference
          .sort(function(a, b){
            var ay = present(a.year) ? Number(a.year) : 9999;
            var by = present(b.year) ? Number(b.year) : 9999;
            if(ay !== by) return ay - by;
            return String(a.ref_title || "").localeCompare(String(b.ref_title || ""));
          })
          .forEach(function(refAlbum){
            var item = document.createElement("div");
            item.className = "reference-item";
            item.textContent = safe(refAlbum.ref_title);
            referenceList.appendChild(item);
          });

        referenceBlock.appendChild(referenceList);
      } else {
        var empty = document.createElement("div");
        empty.className = "reference-empty";
        empty.textContent = "Reference album data not yet present in current JSON.";
        referenceBlock.appendChild(empty);
      }

      container.appendChild(referenceBlock);
    }

    select.onchange = function(){
      render(select.value);
    };

    if(artistList.length){
      render(artistList[0].artist_id);
    } else {
      container.innerHTML =
        "<div class='panel'><div class='panel-title'>Error</div><div class='panel-text'>No artist data found.</div></div>";
    }
  })
  .catch(function(err){
    console.error(err);
    document.getElementById("library").innerHTML =
      "<div class='panel'><div class='panel-title'>Error</div><div class='panel-text'>Failed to load library.json</div></div>";
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="utf-8">
<title>Requisite Vinyl Album Collection</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
  color:#eee;
}

body.dark-default{ background-image:url("backgrounds/dark-default.png"); }
body.dark-muted{ background-image:url("backgrounds/dark-muted.png"); }
body.dark-ultra{ background-image:url("backgrounds/dark-ultra.png"); }

body{
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:-1;
}

.app-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:84px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  z-index:100;
  box-sizing:border-box;
}

.header-left{
  display:flex;
  align-items:center;
  gap:14px;
  padding:10px 14px;
  background:rgba(18,18,18,.42);
  border-radius:12px;
  box-shadow:
    0 10px 24px rgba(0,0,0,.35),
    0 2px 4px rgba(0,0,0,.25);
  backdrop-filter:blur(4px);
}

.header-left label{
  font-size:18px;
  font-weight:800;
  color:#f0f0f0;
  letter-spacing:.02em;
}

.header-left select{
  min-width:280px;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(28,28,28,.88);
  color:#f0f0f0;
  font-size:15px;
  outline:none;
}

.app-header img{
  height:62px;
  object-fit:contain;
  margin-right:0;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.7));
}

.container{
  padding:118px 50px 60px;
  max-width:1120px;
  margin:0 auto;
  box-sizing:border-box;
}

.artist-panels{
  display:grid;
  grid-template-columns:1.1fr 1fr 1fr;
  gap:20px;
  margin-bottom:34px;
}

.panel{
  background:rgba(20,20,20,.52);
  border-radius:14px;
  padding:18px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.42),
    0 3px 6px rgba(0,0,0,.28);
  backdrop-filter:blur(4px);
  min-height:150px;
}

.panel-title{
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
}

.meta-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 14px;
}

.meta-item{
  font-size:13px;
}

.meta-label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  color:#bbb;
  margin-bottom:3px;
}

.panel-text{
  font-size:14px;
  line-height:1.5;
}

.section-title{
  font-size:28px;
  font-weight:800;
  margin:0 0 18px;
}

.albums{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
}

.card{
  position:relative;
  width:200px;
  background:rgba(20,20,20,.58);
  border-radius:12px;
  padding:12px;
  box-shadow:
    0 12px 28px rgba(0,0,0,.7),
    0 3px 6px rgba(0,0,0,.6);
  backdrop-filter:blur(4px);
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

.year-line{
  margin-top:10px;
  font-size:12px;
  color:#cfcfcf;
  letter-spacing:.04em;
}

.album-title{
  margin-top:4px;
  font-size:15px;
  font-weight:600;
  line-height:1.35;
}

.collection-line{
  margin-top:8px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.priority-mark{
  color:#ddd;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.collection-mark{
  font-weight:700;
  letter-spacing:.02em;
  color:#8fdc8f;
  flex-shrink:0;
  white-space:nowrap;
}

.hover-detail{
  position:absolute;
  left:12px;
  right:12px;
  top:12px;
  bottom:12px;
  padding:14px;
  border-radius:8px;
  background:rgba(0,0,0,.88);
  opacity:0;
  transition:opacity .2s;
  overflow:auto;
}

.card:hover .hover-detail{
  opacity:1;
}

.reference-block{
  margin-top:38px;
}

.reference-list{
  display:grid;
  gap:10px;
}

.reference-item{
  font-size:18px;
  padding:12px 14px;
  background:rgba(20,20,20,.42);
  border-radius:10px;
  box-shadow:
    0 8px 18px rgba(0,0,0,.28),
    0 2px 4px rgba(0,0,0,.2);
}

.reference-empty{
  font-size:15px;
  color:#c8c8c8;
  opacity:.85;
  font-style:italic;
}

@media (max-width: 980px){
  .artist-panels{
    grid-template-columns:1fr;
  }

  .app-header{
    height:auto;
    padding:14px 18px;
    flex-direction:column;
    align-items:flex-start;
    gap:12px;
  }

  .container{
    padding:138px 22px 40px;
  }

  .header-left{
    width:100%;
  }

  .header-left select{
    min-width:0;
    width:100%;
  }
}
</style>
</head>

<body class="dark-default">

<div class="app-header">
  <div class="header-left">
    <label for="artistSelect">Artist</label>
    <select id="artistSelect"></select>
  </div>
  <img src="backgrounds/banner.png" alt="Requisite Vinyl Album Collection">
</div>

<div class="container">
  <div id="library"></div>
</div>

<script>
fetch("library.json")
  .then(function(r){ return r.json(); })
  .then(function(raw){

    let data = raw;

    if (!Array.isArray(raw) && raw && Array.isArray(raw.rows) && Array.isArray(raw.columns)) {
      const keys = raw.columns.map(function(col){
        return col.displayName || col.name;
      });

      data = raw.rows.map(function(row){
        const obj = {};
        keys.forEach(function(key, i){
          obj[key] = row[i];
        });
        return obj;
      });
    }

    const artists = {};

    data.forEach(function(row){
      const name = row.artist_name || "Unknown Artist";

      if(!artists[name]){
        artists[name] = {
          curated: [],
          reference: [],
          info: row
        };
      }

      const hasCuratedAlbumId =
        row.album_id !== null &&
        row.album_id !== undefined &&
        String(row.album_id).trim() !== "";

      const hasReferenceTitle =
        row.ref_title !== null &&
        row.ref_title !== undefined &&
        String(row.ref_title).trim() !== "";

      if(hasCuratedAlbumId){
        artists[name].curated.push(row);
      } else if(hasReferenceTitle){
        artists[name].reference.push(row);
      }
    });

    const artistNames = Object.keys(artists).sort();
    const select = document.getElementById("artistSelect");
    const container = document.getElementById("library");

    select.innerHTML = "";

    artistNames.forEach(function(name){
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      select.appendChild(option);
    });

    function safe(value){
      if(value === null || value === undefined || value === ""){
        return "—";
      }
      return String(value);
    }

    function coverSrc(path){
      if(!path) return "";
      const filename = String(path).split("/").pop();
      return "media/covers/" + filename;
    }

    function isOwned(value){
      return (
        value === 1 ||
        value === "1" ||
        value === true ||
        String(value).toLowerCase() === "true"
      );
    }

    function render(name){
      const artist = artists[name];
      container.innerHTML = "";

      const panels = document.createElement("div");
      panels.className = "artist-panels";

      const meta = document.createElement("div");
      meta.className = "panel";
      meta.innerHTML = "<div class='panel-title'>Metadata</div>";

      const grid = document.createElement("div");
      grid.className = "meta-grid";

      const metaFields = [
        ["Name", artist.info.artist_name],
        ["Sort", artist.info.sort_name],
        ["Genre", artist.info.artist_type],
        ["Area", artist.info.area],
        ["Born", artist.info.born],
        ["Died", artist.info.ended],
        ["Born In", artist.info.born_in]
      ];

      metaFields.forEach(function(pair){
        const item = document.createElement("div");
        item.className = "meta-item";

        const label = document.createElement("span");
        label.className = "meta-label";
        label.textContent = pair[0];

        const value = document.createElement("span");
        value.textContent = safe(pair[1]);

        item.appendChild(label);
        item.appendChild(value);
        grid.appendChild(item);
      });

      meta.appendChild(grid);

      const desc = document.createElement("div");
      desc.className = "panel";
      desc.innerHTML = "<div class='panel-title'>Description</div><div class='panel-text'>Placeholder</div>";

      const news = document.createElement("div");
      news.className = "panel";
      news.innerHTML = "<div class='panel-title'>News</div><div class='panel-text'>Placeholder</div>";

      panels.appendChild(meta);
      panels.appendChild(desc);
      panels.appendChild(news);
      container.appendChild(panels);

      const title = document.createElement("div");
      title.className = "section-title";
      title.textContent = "Recommended Albums";
      container.appendChild(title);

      const albums = document.createElement("div");
      albums.className = "albums";

      artist.curated.forEach(function(album){
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = coverSrc(album.cover_path);
        img.alt = safe(album.album_title);

        const year = document.createElement("div");
        year.className = "year-line";
        year.textContent = safe(album.year);

        const albumTitle = document.createElement("div");
        albumTitle.className = "album-title";
        albumTitle.textContent = safe(album.album_title);

        const collectionLine = document.createElement("div");
        collectionLine.className = "collection-line";

        const priority = document.createElement("span");
        priority.className = "priority-mark";
        priority.textContent = safe(album.buy_priority);

        const owned = document.createElement("span");
        owned.className = "collection-mark";
        owned.textContent = isOwned(album.owned) ? "✓ Owned" : "";

        collectionLine.appendChild(priority);
        collectionLine.appendChild(owned);

        const hover = document.createElement("div");
        hover.className = "hover-detail";
        hover.textContent = safe(album.album_title);

        card.appendChild(img);
        card.appendChild(year);
        card.appendChild(albumTitle);
        card.appendChild(collectionLine);
        card.appendChild(hover);

        albums.appendChild(card);
      });

      container.appendChild(albums);

      const referenceBlock = document.createElement("div");
      referenceBlock.className = "reference-block";

      const referenceTitle = document.createElement("div");
      referenceTitle.className = "section-title";
      referenceTitle.textContent = "Other Studio Albums";
      referenceBlock.appendChild(referenceTitle);

      if(artist.reference.length){
        const referenceList = document.createElement("div");
        referenceList.className = "reference-list";

        artist.reference.forEach(function(refAlbum){
          const item = document.createElement("div");
          item.className = "reference-item";
          item.textContent = safe(refAlbum.ref_title);
          referenceList.appendChild(item);
        });

        referenceBlock.appendChild(referenceList);
      } else {
        const empty = document.createElement("div");
        empty.className = "reference-empty";
        empty.textContent = "Reference album data not yet present in current JSON.";
        referenceBlock.appendChild(empty);
      }

      container.appendChild(referenceBlock);
    }

    select.onchange = function(){
      render(select.value);
    };

    if(artistNames.length){
      render(artistNames[0]);
    } else {
      container.innerHTML = "<div class='panel'><div class='panel-text'>No artist data found.</div></div>";
    }
  })
  .catch(function(err){
    console.error(err);
    document.getElementById("library").innerHTML =
      "<div class='panel'><div class='panel-title'>Error</div><div class='panel-text'>Failed to load library.json</div></div>";
  });
</script>

</body>
</html>

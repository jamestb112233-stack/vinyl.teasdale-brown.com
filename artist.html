<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Artist</title>

<style>

body{
background:#0c0c0c;
color:#e5e5e5;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;
margin:40px;
}

h1{
margin-bottom:20px;
}

.section{
margin-bottom:40px;
}

.albums{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.card{
width:150px;
text-align:center;
}

.card img{
width:150px;
height:150px;
object-fit:cover;
border-radius:6px;
box-shadow:0 2px 10px rgba(0,0,0,.6);
}

.meta{
font-size:12px;
margin-top:5px;
color:#aaa;
}

.other{
color:#bbb;
line-height:1.7;
}

</style>
</head>

<body>

<h1 id="artist"></h1>

<div class="section">
<h2>Requisite Vinyl Album Collection</h2>
<div class="albums" id="curated"></div>
</div>

<div class="section">
<h2>Other Studio Albums</h2>
<div class="other" id="other"></div>
</div>

<script>

const artistName = "ZZ Top";

fetch('/api/library.json')
.then(r=>r.json())
.then(data=>{

document.getElementById("artist").textContent = artistName;

const curated = data.filter(a => a.artist_name === artistName);

const curatedDiv = document.getElementById("curated");

curated.forEach(a=>{

const card = document.createElement("div");
card.className="card";

const img = document.createElement("img");
img.src="/media/"+a.cover_path;

const title = document.createElement("div");
title.textContent = a.album_title;

const meta = document.createElement("div");
meta.className="meta";
meta.textContent = a.year+" • "+a.buy_priority;

card.appendChild(img);
card.appendChild(title);
card.appendChild(meta);

curatedDiv.appendChild(card);

});

/* placeholder for reference albums */

document.getElementById("other").innerHTML =
"Afterburner<br>Antenna<br>Recycler";

});

</script>

</body>
</html>
